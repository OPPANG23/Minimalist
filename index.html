<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minimal Fashion Editorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <div class="columns">
      <section class="column left-column">
        <figure class="panel image-panel hero">
          <img src="https://source.unsplash.com/800x1080?male,hoodie,studio" alt="Male model wearing beige hoodie and white pants">
        </figure>

        <section class="panel panel-white details">
          <div class="eyebrow">MODEL 01</div>
          <h2 class="title serif">DELICATE</h2>
          <div class="logo bw">
            <div class="logo-mark serif">BW</div>
            <div class="logo-sub sans">Black &amp; White</div>
          </div>
          <p class="copy serif">Time flies fast. We are only sands that want to shine as brightly as possible. But like fading in the wind, clothes are glitter.</p>
        </section>

        <figure class="panel image-panel dark">
          <img src="https://source.unsplash.com/800x620?male,white,shirt,shadow" alt="Male model in white shirt in shadow">
        </figure>

        <section class="panel panel-white design-footer">
          <div class="footer-meta sans">2023 / SM</div>
          <div class="design-lockup">
            <span class="de sans">DE</span>
            <span class="sign sans" aria-hidden="true">SIGN.</span>
          </div>
        </section>
      </section>

      <section class="column right-column">
        <section class="panel panel-white design-header">
          <div class="header-meta sans">2023 / SM</div>
          <div class="design-lockup">
            <span class="de sans">DE</span>
            <span class="sign sans" aria-hidden="true">SIGN.</span>
          </div>
        </section>

        <figure class="panel image-panel portrait">
          <img src="https://source.unsplash.com/800x820?male,white,hoodie,portrait" alt="Male model in white hoodie">
        </figure>

        <section class="panel panel-white text-block">
          <h3 class="eyebrow">MODEL 01</h3>
          <div class="logo bw tight">
            <div class="logo-mark serif">BW</div>
            <div class="logo-sub sans">Black &amp; White</div>
          </div>
          <p class="tagline serif">There is good design. Good design is transparent.</p>
          <img class="mini" src="https://source.unsplash.com/140x90?portrait,man,studio" alt="Model thumbnail">
        </section>

        <figure class="panel image-panel window">
          <img src="https://source.unsplash.com/800x980?woman,white,tshirt,window" alt="Female model near a window wearing white t-shirt and shorts">
          <figcaption class="caption serif">EMERSON</figcaption>
        </figure>
      </section>
    </div>
  </main>
</body>
</html>
